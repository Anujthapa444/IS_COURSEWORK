<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="UrbanSprout cart page with items and total estimated price."
    />
    <title>UrbanSprout Nepal | Cart</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="navbar">
      <div class="container nav-inner">
        <a
          href="../index.html"
          style="text-align: center; color: white; text-decoration: none"
          ><div class="brand">UrbanSprout Pokhara</div></a
        >
        <nav class="nav-links">
          <a href="../index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="blog.html">Blog</a>
          <a href="research.html">Research</a>
          <a href="about.html">About Us</a>
          <a href="cart.html" class="active">Cart</a>
        </nav>
      </div>
    </div>

    <main class="container section">
      <h1>Cart</h1>
      <p>This page shows all equipment/items added to cart and total estimate.</p>

      <section class="section">
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Unit Price</th>
              <th>Quantity</th>
              <th>Line Total</th>
            </tr>
          </thead>
          <tbody id="cartBody"></tbody>
        </table>
      </section>

      <section class="section">
        <p><strong>Total Items:</strong> <span id="cartItems">0</span></p>
        <p><strong>Estimated Total:</strong> <span id="cartTotal">NPR 0</span></p>
        <button class="btn btn-secondary" id="clearCartBtn">Clear Cart</button>
      </section>
    </main>

    <footer>
      <div class="container">
        <p class="footer-text">
          UrbanSprout Nepal | Informatics College Pokhara | Course: CC4057NP
          <br />Today: <span id="todayDate"></span>
        </p>
      </div>
    </footer>

    <script src="../js/script.js"></script>
  </body>
</html>
